name: CI - Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    services:
      trilium:
        image: triliumnext/trilium:latest
        ports:
          - 9090:8080
        env:
          TRILIUM_DATA_DIR: /tmp/trilium-data
        options: >-
          --health-cmd "curl -f http://localhost:8080 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Wait for Trilium to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:9090; then
              echo "Trilium is ready"
              break
            fi
            echo "Waiting for Trilium... ($i/30)"
            sleep 2
          done

      - name: Setup Trilium test instance
        run: |
          # Get initial setup token
          SETUP_TOKEN=$(curl -s http://localhost:9090/api/setup/new-token | jq -r '.token')
          
          # Initialize Trilium with test credentials
          curl -X POST http://localhost:9090/api/setup/new-document \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"test\",
              \"password\": \"testpassword\",
              \"theme\": \"light\",
              \"token\": \"$SETUP_TOKEN\"
            }"
          
          # Get auth token for tests
          AUTH_RESPONSE=$(curl -X POST http://localhost:9090/api/login/token \
            -H "Content-Type: application/json" \
            -d '{"username": "test", "password": "testpassword"}')
          
          echo "TRILIUM_TOKEN=$(echo $AUTH_RESPONSE | jq -r '.token')" >> $GITHUB_ENV
          echo "TRILIUM_URL=http://localhost:9090" >> $GITHUB_ENV

      - name: Run tests
        run: |
          cargo test --all-features --verbose
        env:
          TRILIUM_URL: ${{ env.TRILIUM_URL }}
          TRILIUM_TOKEN: ${{ env.TRILIUM_TOKEN }}

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    services:
      trilium:
        image: triliumnext/trilium:latest
        ports:
          - 9090:8080
        env:
          TRILIUM_DATA_DIR: /tmp/trilium-data
        options: >-
          --health-cmd "curl -f http://localhost:8080 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-
            ${{ runner.os }}-cargo-

      - name: Wait for Trilium to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:9090; then
              echo "Trilium is ready"
              break
            fi
            echo "Waiting for Trilium... ($i/30)"
            sleep 2
          done

      - name: Setup Trilium test instance
        run: |
          # Get initial setup token
          SETUP_TOKEN=$(curl -s http://localhost:9090/api/setup/new-token | jq -r '.token')
          
          # Initialize Trilium with test credentials
          curl -X POST http://localhost:9090/api/setup/new-document \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"test\",
              \"password\": \"testpassword\",
              \"theme\": \"light\",
              \"token\": \"$SETUP_TOKEN\"
            }"
          
          # Get auth token for tests
          AUTH_RESPONSE=$(curl -X POST http://localhost:9090/api/login/token \
            -H "Content-Type: application/json" \
            -d '{"username": "test", "password": "testpassword"}')
          
          echo "TRILIUM_TOKEN=$(echo $AUTH_RESPONSE | jq -r '.token')" >> $GITHUB_ENV
          echo "TRILIUM_URL=http://localhost:9090" >> $GITHUB_ENV

      - name: Build CLI
        run: cargo build --release

      - name: Run integration tests
        run: |
          # Set up config for CLI
          mkdir -p ~/.config/trilium-cli
          cat > ~/.config/trilium-cli/config.yaml << EOF
          profiles:
            default:
              url: ${{ env.TRILIUM_URL }}
              token: ${{ env.TRILIUM_TOKEN }}
          EOF
          
          # Run integration test suite
          cargo test --test '*' --release
        env:
          TRILIUM_URL: ${{ env.TRILIUM_URL }}
          TRILIUM_TOKEN: ${{ env.TRILIUM_TOKEN }}

      - name: Test CLI commands
        run: |
          # Test basic CLI operations
          ./target/release/trilium note list
          ./target/release/trilium note create --title "Test Note" --content "Test content"
          ./target/release/trilium search "Test"
          ./target/release/trilium info

  test-matrix:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run unit tests
        run: cargo test --lib --verbose